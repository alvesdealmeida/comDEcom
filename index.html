<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Gatinho — Edição 10 Desafios</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cent:#FF5412; --dez:#00A89D; --uni:#FFD100;
  --bg:#0F172A; --card:#1E293B; --card2:#334155;
  --white:#FFFFFF; --green:#22C55E; --pink:#F43F5E;
  --purple:#8B5CF6; --yellow:#FACC15;
}
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow:hidden; touch-action: manipulation;}

@media (min-width: 1025px) {
  body::before {
    content: "Otimizado para Celular e Tablet";
    position: fixed; inset: 0; background: var(--bg); z-index: 9999;
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
  }
}

.screen{position:fixed; inset:0; z-index:1; height: 100vh; display:flex; align-items:center; justify-content:center; padding:15px; flex-direction: column; background: var(--bg);}
.hidden{display:none!important}

.hud{position:fixed;top:0;left:0;right:0;z-index:100;padding:8px 15px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:2px solid rgba(255,255,255,0.1)}
.hud-hearts{font-size:1.1rem}
.hud-level{background: var(--purple); padding: 2px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 900;}
.hud-score{font-family:'Fredoka One',sans-serif; color:var(--yellow); text-align: right; line-height: 1;}
.hud-score span { font-size: 0.6rem; display: block; color: var(--white); opacity: 0.8;}

.timer-container { width: 100%; height: 8px; background: rgba(255,255,255,0.1); position: fixed; top: 56px; z-index: 101; }
#timer-fill { height: 100%; width: 100%; background: var(--yellow); transition: width 0.1s linear; }

.menu-grid { display: grid; gap: 10px; width: 100%; max-width: 350px; margin-top: 15px; }
.lvl-card { background: var(--card); border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: left; position: relative; }
.lvl-card h3 { font-family: 'Fredoka One'; color: var(--yellow); font-size: 1.1rem; }
.lvl-card p { font-size: 0.8rem; opacity: 0.7; }
.lvl-prize { font-size: 0.7rem; color: var(--green); font-weight: 900; display: block; margin-top: 5px; }

.number-display{background:var(--card2); border-radius:20px; padding:15px; margin-bottom:15px; text-align:center; width: 100%; max-width: 400px; box-shadow: 0 4px 0 rgba(0,0,0,0.3)}
.num-big{font-family:'Fredoka One',sans-serif; font-size: 3.5rem; letter-spacing:4px;}
.num-digit.highlight{ text-decoration: underline; text-underline-offset: 8px; filter: drop-shadow(0 0 8px currentColor);}

.question-card{background:var(--card); border-radius:18px; padding:18px; border-left: 6px solid var(--purple); margin-bottom: 15px; width: 100%; max-width: 400px;}
.question-text{font-size:1.1rem; font-weight:900; line-height:1.4}

.options-grid{display:grid; grid-template-columns: 1fr; gap:10px; width: 100%; max-width: 400px;}
.opt{background:var(--card2); border: 2px solid rgba(255,255,255,0.1); border-radius:14px; padding:16px; color:white; font-family:'Fredoka One',sans-serif; font-size:1.2rem; transition: transform 0.1s; border:none; cursor:pointer;}
.opt:active{transform: scale(0.95); background: var(--purple);}

.c {color:var(--cent)} .d {color:var(--dez)} .u {color:var(--uni)}
.btn-play{background:var(--green); color:#064e3b; padding:18px 40px; border-radius:50px; font-family:'Fredoka One',sans-serif; font-size:1.5rem; border:none; box-shadow: 0 6px 0 #15803d; cursor:pointer;}
</style>
</head>
<body>

<div class="hud hidden" id="game-hud">
  <div class="hud-hearts" id="hearts">❤️❤️❤️</div>
  <div class="hud-level" id="hud-level-tag">NÍVEL 1</div>
  <div class="hud-score" id="hud-score">0<span>PONTOS</span></div>
</div>
<div class="timer-container hidden" id="timer-bar"><div id="timer-fill"></div></div>

<div class="screen" id="title-screen">
  <h1 style="font-family:'Fredoka One'; font-size:2.5rem; margin-bottom:10px; text-align:center;">MATH <span style="color:var(--dez)">GATINHO</span></h1>
  <p style="font-weight:700; opacity:0.6; margin-bottom:15px; text-align:center;">Complete 10 questões para ganhar o prêmio!</p>
  <div class="menu-grid">
    <div class="lvl-card" onclick="startGame(0)">
        <h3>Nível 1</h3><p>Valor Absoluto (15s)</p>
        <span class="lvl-prize">🏆 Medalha de Bronze</span>
    </div>
    <div class="lvl-card" onclick="startGame(1)">
        <h3>Nível 2</h3><p>Valor Relativo (12s)</p>
        <span class="lvl-prize">🏆 Troféu de Prata</span>
    </div>
    <div class="lvl-card" onclick="startGame(2)">
        <h3>Nível 3</h3><p>Decomposição (8s)</p>
        <span class="lvl-prize">🏆 Coroa de Ouro</span>
    </div>
  </div>
</div>

<div class="screen hidden" id="game-screen">
  <div class="number-display">
    <div class="num-big" id="num-display">
      <span class="num-digit c" id="d-c">0</span><span class="num-digit d" id="d-d">0</span><span class="num-digit u" id="d-u">0</span>
    </div>
  </div>
  <div class="question-card">
    <p class="question-text" id="q-text">Carregando...</p>
  </div>
  <div class="options-grid" id="options-grid"></div>
</div>

<div class="screen hidden" id="prize-screen">
  <div style="text-align:center; background:var(--card); padding:30px; border-radius:24px; width:90%">
    <h2 style="font-family:'Fredoka One'; font-size:2rem; color:var(--yellow)">INCÍVEL!</h2>
    <div id="prize-icon" style="font-size:6rem; margin:20px 0;">🏆</div>
    <p id="prize-desc" style="font-weight:900; margin-bottom:25px;"></p>
    <button class="btn-play" onclick="showMenu()">MENU INICIAL</button>
  </div>
</div>

<div class="screen hidden" id="result-screen">
  <div style="text-align:center; background:var(--card); padding:30px; border-radius:24px; width:90%">
    <h2 style="font-family:'Fredoka One'; font-size:2rem; color:var(--pink)">TENTE DE NOVO</h2>
    <div style="font-size:4rem; margin:20px 0; font-family:'Fredoka One'" id="res-score">0</div>
    <button class="btn-play" onclick="showMenu()">RECOMEÇAR</button>
  </div>
</div>

<script>
const CONFIG = {
  0: { label: "NÍVEL 1", time: 15, mode: 'abs', prize: "Medalha de Bronze", icon: "🥉" },
  1: { label: "NÍVEL 2", time: 12, mode: 'rel', prize: "Troféu de Prata", icon: "🥈" },
  2: { label: "NÍVEL 3", time: 8,  mode: 'dec', prize: "Coroa de Ouro", icon: "🥇" }
};

const Q_POR_NIVEL = 10; // Aumentado para 10 questões

let state = {
  score: 0, lives: 3, level: 0, qIndex: 0,
  currentAns: null, timer: null, timeLeft: 0, 
  canClick: true
};

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

const soundOk = () => { playTone(600, 'sine', 0.2); setTimeout(()=>playTone(800, 'sine', 0.3), 100); };
const soundErr = () => { playTone(200, 'sawtooth', 0.5); };
const soundWin = () => { [440, 554, 659, 880].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.6), i * 150)); };

function showMenu() {
    location.reload();
}

function startGame(lvl) {
  state.score = 0; state.lives = 3; state.level = lvl; state.qIndex = 0;
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('prize-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('game-hud').classList.remove('hidden');
  document.getElementById('timer-bar').classList.remove('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  nextQuestion();
}

function nextQuestion() {
  state.canClick = true;
  if (state.lives <= 0) return endGame(false);
  if (state.qIndex >= Q_POR_NIVEL) return endGame(true);

  const cfg = CONFIG[state.level];
  document.getElementById('hud-level-tag').innerText = `${cfg.label} (${state.qIndex + 1}/${Q_POR_NIVEL})`;
  
  const c = Math.floor(Math.random() * 9) + 1;
  const d = Math.floor(Math.random() * 10);
  const u = Math.floor(Math.random() * 10);
  const num = c * 100 + d * 10 + u;

  document.getElementById('d-c').innerText = c;
  document.getElementById('d-d').innerText = d;
  document.getElementById('d-u').innerText = u;

  ['d-c', 'd-d', 'd-u'].forEach(id => document.getElementById(id).classList.remove('highlight'));

  let options = [];
  
  if (cfg.mode === 'dec') {
    state.currentAns = `${c*100} + ${d*10} + ${u}`;
    document.getElementById('q-text').innerHTML = `Qual a <b style="color:var(--yellow)">DECOMPOSIÇÃO</b> de ${num}?`;
    options = generateDecOptions(c, d, u);
  } else {
    const digits = [
      {v: c, r: c*100, id: 'd-c'},
      {v: d, r: d*10, id: 'd-d'},
      {v: u, r: u, id: 'd-u'}
    ];
    const target = digits[Math.floor(Math.random() * 3)];
    document.getElementById(target.id).classList.add('highlight');

    if (cfg.mode === 'abs') {
      state.currentAns = String(target.v);
      document.getElementById('q-text').innerHTML = `Qual o valor <b style="color:var(--green)">ABSOLUTO</b> do destacado?`;
    } else {
      state.currentAns = String(target.r);
      document.getElementById('q-text').innerHTML = `Qual o valor <b style="color:var(--pink)">RELATIVO</b> do destacado?`;
    }
    options = generateNormalOptions(state.currentAns);
  }

  renderOptions(options);
  resetTimer(cfg.time);
}

function generateNormalOptions(correct) {
  let opts = new Set([correct]);
  while(opts.size < 4) {
    let fake = parseInt(correct) + (Math.random() > 0.5 ? 10 : -10) * (Math.floor(Math.random()*3)+1);
    if (fake < 0) fake = Math.floor(Math.random()*900);
    opts.add(String(fake));
  }
  return Array.from(opts).sort(() => Math.random() - 0.5);
}

function generateDecOptions(c, d, u) {
  const correct = `${c*100} + ${d*10} + ${u}`;
  let opts = new Set([correct]);
  while(opts.size < 4) {
    let fC = (Math.random() > 0.5 ? c : Math.floor(Math.random()*9)+1) * 100;
    let fD = (Math.random() > 0.5 ? d : Math.floor(Math.random()*10)) * 10;
    let fU = (Math.random() > 0.5 ? u : Math.floor(Math.random()*10));
    let fake = `${fC} + ${fD} + ${fU}`;
    if (fake !== correct) opts.add(fake);
  }
  return Array.from(opts).sort(() => Math.random() - 0.5);
}

function renderOptions(options) {
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt);
    grid.appendChild(btn);
  });
}

function resetTimer(maxTime) {
  if (state.timer) clearInterval(state.timer);
  state.timeLeft = maxTime;
  const fill = document.getElementById('timer-fill');
  
  state.timer = setInterval(() => {
    state.timeLeft -= 0.1;
    let pct = (state.timeLeft / maxTime) * 100;
    fill.style.width = pct + "%";
    fill.style.background = pct < 30 ? "var(--pink)" : "var(--yellow)";
    
    if (state.timeLeft <= 0) {
      clearInterval(state.timer);
      state.timer = null;
      checkAnswer(null); 
    }
  }, 100);
}

function checkAnswer(val) {
  if (!state.canClick) return;
  state.canClick = false;

  if (state.timer) {
    clearInterval(state.timer);
    state.timer = null;
  }

  if (val === state.currentAns) {
    soundOk();
    state.score += Math.ceil(state.timeLeft * 10) + 50;
    state.qIndex++;
  } else {
    soundErr();
    state.lives--;
    document.getElementById('hearts').innerText = "❤️".repeat(Math.max(0, state.lives)) + "🖤".repeat(3 - Math.max(0, state.lives));
  }

  document.getElementById('hud-score').innerHTML = state.score + "<span>PONTOS</span>";
  
  if (state.lives <= 0) {
    setTimeout(() => endGame(false), 500);
  } else if (state.qIndex >= Q_POR_NIVEL) {
    setTimeout(() => endGame(true), 500);
  } else {
    setTimeout(nextQuestion, 500);
  }
}

function endGame(victory) {
  if (state.timer) clearInterval(state.timer);
  
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('game-hud').classList.add('hidden');
  document.getElementById('timer-bar').classList.add('hidden');

  if(victory) {
    soundWin();
    const cfg = CONFIG[state.level];
    document.getElementById('prize-screen').classList.remove('hidden');
    document.getElementById('prize-icon').innerText = cfg.icon;
    document.getElementById('prize-desc').innerText = "Incrível! Você conquistou a " + cfg.prize;
  } else {
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('res-score').innerText = state.score + " PONTOS";
  }
}
</script>
</body>
</html>
